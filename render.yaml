databases:
  - name: crimegpt-db
    plan: free
    databaseName: crimegpt
    user: crimegpt

services:
  - type: web
    name: crimegpt-backend
    runtime: python
    plan: free
    buildCommand: pip install -r backend/requirements.txt
    startCommand: cd backend && uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: crimegpt-db
          property: connectionURI
      - key: PYTHON_VERSION
        value: "3.11.6"
      - key: JWT_SECRET_KEY
        generateValue: true
      - key: GEMINI_API_KEY
        sync: false
      - key: FRONTEND_URL
        value: "https://frontend-neon-eta-6jw9gfiqa5.vercel.app"
      - key: CORS_ORIGINS
        value: '["https://frontend-neon-eta-6jw9gfiqa5.vercel.app"]'
      - key: QDRANT_HOST
        value: "localhost"
      - key: QDRANT_PORT
        value: "6333"
    rootDir: .
    healthCheckPath: /api/health
